# Run one pass by default. Set to true to keep polling continuously.
watch: false

# Poll interval in seconds when watch=true.
sleep_seconds: 2.0

# Shared memory root for the notes -> doc -> sop chain.
memory_root: memory

# Default model for agents that do not override their own model.
default_model: gpt-5.4

# Optional per-agent model overrides.
agent_models:
  note-relation: gpt-5.4
  doc-maintenance: gpt-5.4
  sop-promotion: gpt-5.4
